<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessGame</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
    

</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
        <span class="logo-icon">♔</span>
        <h1>CHESS<span>MASTER</span></h1>
        </div>
    <div class="turn-panel">
        <div class="turn-label">CURRENT TURN</div>
        <div class="turn-indicator" id="turnIndicator">
            <span class="turn-piece" id="turnPiece">♔</span>
            <span class="turn-name" id="turnName">WHITE</span>
        </div>
    </div>

    <div class="status-panel" id="statusPanel">
        <p id="statusText">Game in Progress...</p>
    </div>

    <div class="captured-panel">
        <div class="captured-group">
            <div class="captured-label">WHITE captured</div>
            <div class="captured-pieces" id="whiteCaptured"></div>
    </div>
        
        <div class="captured-group">
            <div class="captured-label">BLACK  captured</div>
            <div class="captured-pieces" id="blackCaptured"></div>
        </div>
     </div>

        <div class="move-history-panel"> 
            <div class="panel-title">MOVE HISTORY</div>
            <div class="move-list" id="moveList"></div>
        </div>

         
        <div class="controls">
            <button class="btn-primary" id="newGameBtn">New Game</button>
            <button class="btn-secondary" id="undoBtn">Undo Move</button>
        </div>
    </aside>    
       

     <main class="board-area">
        <div class="board-wrapper">
            <div class="rank-labels" id="rankLabels"></div>
            <div class="board-col">
               <div class="board" id="chessBoard"></div>
               <div class="file-labels" id="fileLabels"></div> 
            </div>
        </div>
     </main>
    </div>


  <div class="modal-overlay" id="promotionModal">
    <div class="modal">
        <h2>Promote Pawn</h2>
        <p>Choose a piece:</p>
        <div class="promotion-choices" id="promotionChoices"></div>
    </div>
  </div>

   <script src="pieces.js"></script>
   <script src="board.js"></script>
   <script src="moves.js"></script>
   <script src="game.js"></script>
   

</body>
</html>
