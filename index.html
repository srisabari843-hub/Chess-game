<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessGame</title>
    

</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
        <span class="logo-icon">♔</span>
        <h1>CHESS<span>Master</span></h1>
        </div>
    <div class="turn-panel">
        <div class="turn-label">CURRENT TURN</div>
        <div class="tune-indicator" id="turnIndicator">
            <span class="turn-piece" id="turnPiece">♔</span>
            <span class="turn-name" id="turnName">White</span>
        </div>
    </div>

    <div class="status-panel" id="statusPanel">
        <p id="statusText">Game in Progress...</p>
    </div>

    <div class="captures-panel">
        <div class="captured-group">
            <div class="captured-label">WHITE captured</div>
            <div class="captured-piece" id="whiteCaptured"></div>
    </div>
        
        <div class="captured-group">
            <div class="captured-label">BLACK  captured</div>
            <div class="captured-pieces" id="blackCaptured"></div>
        </div>

        <div class="move-history-panel">
            <div class="panel-title">MOVE HISTORY</div>
            <div class="move-list"id=moveList></div>
        </div>
         
        <div class="controls">
            <button class="btn-primary" id="newGameBtn">New Game</button>
            <button class="btn-secondary" id="undiBtn">Undo Move</button>
        </div>
    </aside>
       

     <main class="border-area">
        <div class="border-wrapped">
            <div class="rank-lables" id="rankLabels"></div>
            <div class="border-col">
               <div class="border" id="chessBord"></div>
               <div class="file-Lables" id="fileLables"></div> 
            </div>
        </div>
     </main>
    </div>


  <div class="model-overlay" id="promotionModel">
    <div class="model">
        <h2>Promote Pawn</h2>
        <p>Choose a piece;</p>
        <div class="promotion-choice" id="promotionChoice"></div>
    </div>
  </div>

   <script src="pieces.js"></script>
   <script src="bord.js"></script>
   <script src="moves.js"></script>
   <script src="game.js"></script>
   

</body>
</html>
